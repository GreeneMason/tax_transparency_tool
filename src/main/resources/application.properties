spring.datasource.url=${GOVLENS_DB_URL:jdbc:postgresql://localhost:5432/govlens}
spring.datasource.username=${GOVLENS_DB_USER:postgres}
spring.datasource.password=${GOVLENS_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=false

server.port=${PORT:8080}

govlens.cors.allowed-origins=${GOVLENS_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,null}
